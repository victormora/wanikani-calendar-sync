name: WaniKani Google Calendar Sync

on:
  schedule:
    - cron: "*/8 * * * *"
  workflow_dispatch: # manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug token length
        env:
          GCAL_REFRESH_TOKEN: ${{ secrets.GCAL_REFRESH_TOKEN }}
        run: echo "Refresh token length: ${#GCAL_REFRESH_TOKEN}"

